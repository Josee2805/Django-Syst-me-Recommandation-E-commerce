<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email envoyé — LuxeMart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --gold: #C9A84C; --gold-light: #F0D080; }
    body {
      min-height:100vh; background:linear-gradient(135deg,#1A1A2E,#0F3460);
      display:flex; align-items:center; justify-content:center;
      font-family:'Segoe UI',sans-serif; padding:20px;
    }
    .card {
      background:rgba(255,255,255,0.07); backdrop-filter:blur(20px);
      border:1px solid rgba(201,168,76,0.3); border-radius:16px;
      padding:56px 44px; max-width:460px; width:100%; text-align:center;
      box-shadow:0 24px 64px rgba(0,0,0,0.4);
    }
    .icon { font-size:56px; margin-bottom:20px; animation:pulse 2s infinite; }
    @keyframes pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(201,168,76,0.3); }
      50%      { box-shadow:0 0 0 16px rgba(201,168,76,0); }
    }
    h2 { color:var(--gold-light); font-size:1.5rem; font-weight:700; margin-bottom:10px; }
    p  { color:rgba(255,255,255,0.55); line-height:1.8; }
    .btn-outline {
      display:inline-block; margin-top:24px;
      border:1px solid var(--gold); color:var(--gold-light);
      background:transparent; padding:10px 28px;
      border-radius:10px; text-decoration:none; transition:all 0.3s;
    }
    .btn-outline:hover { background:rgba(201,168,76,0.1); color:var(--gold-light); }
    .help { color:rgba(255,255,255,0.3); font-size:0.78rem; margin-top:20px; }
    .help a { color:var(--gold-light); }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">📧</div>
  <h2>Vérifiez votre email !</h2>
  <p>Un lien de vérification a été envoyé à votre adresse email.<br>
     Le lien expire dans <strong style="color:var(--gold-light)">24 heures</strong>.</p>
  <a href="{% url 'login' %}" class="btn-outline">
    <i class="fas fa-arrow-left me-2"></i>Retour à la connexion
  </a>
  <p class="help">
    Pas reçu ? <a href="{% url 'resend_verification' %}">Renvoyer le lien</a><br>
    Vérifiez aussi vos spams.
  </p>
</div>
</body>
</html>
